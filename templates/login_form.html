{% load static %}

<html>
    <head>
        <title>
            Shop Login Page
        </title>

<style>
body{

    background: linear-gradient(135deg, #0B1C3D, #1E3A8A);

}


.login_shop{

    height:500px;
    width: 500px;
    border:3px solid white;
    text-align: center;
    margin-left: 500px;
    margin-top: 150px;
    background-color: white;
    border-radius: 10px;
    box-shadow: 2px 5px 7px 3px greenyellow ;
    
}

#l{
    padding:8px;
    margin-left: 60px;
    background-color: blue;
    color: white;
    border-radius: 5px;
     border: 1px solid white;
     width: 70px;
    
}

#c{
     padding:8px;
     margin-left: 20px;
      background-color:green;
    color: white;
    border-radius: 5px;
    border: 1px solid white;
    width: 70px;
    
}

#r{
    margin-left: 50px;
     text-decoration: underline;
    color: rgb(23, 23, 23);
    font-size: 17px;
    color:#38bdf8;
       font-weight: bold;
}
#fp{
    margin-left: 50px;
     text-decoration: underline;
    color:#38bdf8;
    font-size: 17px;
    font-weight: bold;

}


</style>



    </head>

<body>

<form class="login_shop" method="POST" action="{% url 'login_check' %}">
    {% csrf_token %}
    <img style="border-radius: 50%;" src="{% static 'ipl_logo.png'%}" height="120px" width="120px" >
    <h2 style="padding-left: 40px;font-size: 20px;color:black;font-weight: bold;">IPL auction Login 2026</h2>
    <br>
    <br>

    <label style="color:black;font-weight: bold;">Phone-No :</label>
    <input type="number" name="numbers" value="">
    <br>
    <br>
    
    <br>
     <label style="color:black;font-weight: bold;">Password :</label>
    <input type="password" name="passwords" value="">
    <br>
    
    <br>
    <br>
    <input id="l" type="submit" name="submit" value="Login">
    <input id="c" type="reset" name="reset" value="Cancel">
    <br>
    <br>
    <br>
    <a id="fp" href="#">Forget Password</a>
    
    <br>
    <br>
    <a id="r" href="{% url 'register' %}">Register</a>






</form>

</body>




</html>
