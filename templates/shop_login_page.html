{% load static %}

<html>
    <head>
        <title>
            Shop Login Page
        </title>

<style>
body{

    background-color: rgb(125, 58, 232);
}


.login_shop{

    height:500px;
    width: 500px;
    border:3px solid white;
    text-align: center;
    margin-left: 500px;
    margin-top: 150px;
    background-color: rgb(211, 236, 199);
    border-radius: 10px;
    box-shadow: 2px 5px 7px 3px rgb(250, 244, 244) ;
    
}

#l{
    padding:8px;
    margin-left: 60px;
    background-color: blue;
    color: white;
    border-radius: 5px;
     border: 1px solid white;
     width: 70px;
      box-shadow: 2px 5px 7px 3px rgb(180, 244, 255) ;
}

#c{
     padding:8px;
     margin-left: 20px;
      background-color:green;
    color: white;
    border-radius: 5px;
    border: 1px solid white;
    width: 70px;
    box-shadow: 2px 5px 7px 3px rgb(160, 255, 189) ;
}

#r{
    margin-left: 50px;
     text-decoration: underline;
    color: rgb(23, 23, 23);
    font-size: 17px;

}
#fp{
    margin-left: 50px;
     text-decoration: underline;
    color: rgb(23, 23, 23);
    font-size: 17px;

}


</style>



    </head>

<body>

<form class="login_shop" method="POST" action="{% url 'datalogins' %}">
    {% csrf_token %}
    <img style="border-radius: 50%;" src="{% static 'ipl_logo.png'%}" height="120px" width="120px" >
    <h2 style="padding-left: 40px;font-size: 20px;color: rgb(63, 92, 207);font-weight: bold;">IPL Shopping Login</h2>
    <br>
    <br>

    <label>Phone-No :</label>
    <input type="number" name="numbers" value="">
    <br>
    <br>
    
    <br>
     <label>Password :</label>
    <input type="password" name="passwords" value="">
    <br>
    
    <br>
    <br>
    <input id="l" type="submit" name="submit" value="Login">
    <input id="c" type="reset" name="reset" value="Cancel">
    <br>
    <br>
    <br>
    <a id="fp" href="#">Forget Password</a>
    
    <br>
    <br>
    <a id="r" href="{% url 'reg_shop' %}">Register</a>






</form>

</body>




</html>
